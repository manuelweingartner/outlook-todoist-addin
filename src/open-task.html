<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Todoist öffnen</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; font-size: 14px; padding: 24px; }
    a { color: #e44332; }
  </style>
</head>
<body>
  <p>Todoist wird geöffnet...</p>
  <p>Falls sich die Desktop-App nicht öffnet: <a id="web" href="https://app.todoist.com">Aufgabe im Browser öffnen</a></p>
  <script>
    // Diese Seite laeuft im System-Browser (nicht in der Outlook-Webview) und darf
    // deshalb das todoist://-Protokoll ausloesen. Danach schliesst sie sich selbst;
    // klappt das Schliessen nicht, bleibt der Web-Fallback-Link stehen.
    // id = alte numerische Id (einzige, die todoist://task?id= im Desktop-Client
    // versteht), web = neue alphanumerische Id fuer den Web-App-Link. Fehlt web,
    // dient id fuer beides (Fallback, wenn das Id-Mapping nicht verfuegbar war).
    var params = new URLSearchParams(window.location.search);
    var idOk = function (v) { return /^[A-Za-z0-9_-]+$/.test(v); };
    var id = params.get("id") || "";
    var web = params.get("web") || "";
    var safe = idOk(id) ? id : "";
    var safeWeb = idOk(web) ? web : safe;
    if (safe) {
      document.getElementById("web").href = "https://app.todoist.com/app/task/" + safeWeb;
      window.location.href = "todoist://task?id=" + safe;
      setTimeout(function () { window.close(); }, 1500);
    } else {
      document.body.firstElementChild.textContent = "Keine gültige Task-Id übergeben.";
    }
  </script>
</body>
</html>
