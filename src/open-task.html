<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Todoist öffnen</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; font-size: 15px; padding: 32px; line-height: 1.5; }
    .btn {
      display: inline-block; margin: 8px 0; padding: 10px 18px; border-radius: 6px;
      background: #e44332; color: #fff; text-decoration: none; font-weight: 600;
    }
    .muted { color: #888; font-size: 13px; }
    a.web { color: #e44332; }
  </style>
</head>
<body>
  <p id="status">Todoist wird geöffnet...</p>
  <p><a id="app" class="btn" href="#">Task in Todoist öffnen</a></p>
  <p class="muted">Beim ersten Mal fragt der Browser, ob Todoist geöffnet werden darf.
     Bitte bestätigen (und optional "Immer erlauben" wählen).</p>
  <p class="muted">Klappt das nicht: <a id="web" class="web" href="https://app.todoist.com">im Browser öffnen</a></p>
  <script>
    // Diese Seite laeuft im System-Browser (nicht in der Outlook-Webview) und darf
    // deshalb das todoist://-Protokoll ausloesen. Die Task-Id ist die neue
    // alphanumerische v1-Id.
    //
    // Deeplink-Format: NICHT todoist://task?id= verwenden - das oeffnet zwar die
    // richtige Task, gilt aber als veraltetes Link-Format und zeigt jedes Mal eine
    // "Link aktualisieren"-Warnung. Stattdessen todoist://navigate-to?url= mit der
    // neuen Task-URL (app.todoist.com/app/task/<id>): der Desktop-Client navigiert
    // direkt ueber das neue Format, keine Warnung (per App-Log + Screenshot verifiziert:
    // "Navigation deeplink successfully navigated to: task"). Der Host heisst
    // "navigate-to" (mit Bindestrich), die url muss same-origin app.todoist.com sein.
    //
    // WICHTIG: NICHT automatisch window.close() aufrufen. Chrome zeigt beim ersten
    // Mal einen Bestaetigungsdialog ("todoist-Link oeffnen?"); schliesst sich die
    // Seite selbst, verschwindet der Dialog bevor der Nutzer bestaetigen kann und
    // die App wird nie erreicht. Stattdessen versuchen wir das Auto-Oeffnen und
    // lassen einen echten Klick-Button stehen (Nutzergeste oeffnet zuverlaessig).
    var params = new URLSearchParams(window.location.search);
    var idOk = function (v) { return /^[A-Za-z0-9_-]+$/.test(v); };
    var id = params.get("id") || "";
    var safe = idOk(id) ? id : "";
    if (safe) {
      var webUrl = "https://app.todoist.com/app/task/" + safe;
      var appUrl = "todoist://navigate-to?url=" + webUrl;
      document.getElementById("app").href = appUrl;
      document.getElementById("web").href = webUrl;
      // Auto-Versuch (klappt, sobald der Nutzer todoist:// einmal erlaubt hat).
      window.location.href = appUrl;
    } else {
      document.getElementById("status").textContent = "Keine gültige Task-Id übergeben.";
      var appBtn = document.getElementById("app");
      if (appBtn) appBtn.style.display = "none";
    }
  </script>
</body>
</html>
